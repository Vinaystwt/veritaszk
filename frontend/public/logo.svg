<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VeritasZK">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fffb0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4fffb0" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <!-- Background fill -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-glow)"/>

  <!-- Outer hexagon (flat-top, precision instrument style) -->
  <polygon
    points="32,3 58,17.5 58,46.5 32,61 6,46.5 6,17.5"
    stroke="#4fffb0"
    stroke-width="1.25"
    fill="none"
    stroke-opacity="0.9"
  />

  <!-- Inner hexagon ring (engraved detail) -->
  <polygon
    points="32,9 53,21 53,43 32,55 11,43 11,21"
    stroke="#4fffb0"
    stroke-width="0.5"
    fill="none"
    stroke-opacity="0.22"
  />

  <!-- Corner tick marks — circuit precision aesthetic -->
  <!-- Top vertex -->
  <line x1="32" y1="3" x2="32" y2="0" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom vertex -->
  <line x1="32" y1="61" x2="32" y2="64" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Top-right -->
  <line x1="58" y1="17.5" x2="61" y2="15.9" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom-right -->
  <line x1="58" y1="46.5" x2="61" y2="48.1" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Top-left -->
  <line x1="6" y1="17.5" x2="3" y2="15.9" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom-left -->
  <line x1="6" y1="46.5" x2="3" y2="48.1" stroke="#4fffb0" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Z letterform — geometric, monospace -->
  <polyline
    points="20,23 30,23 20,41 30,41"
    stroke="#4fffb0"
    stroke-width="2.8"
    stroke-linecap="square"
    stroke-linejoin="miter"
    fill="none"
  />

  <!-- K letterform -->
  <line x1="35" y1="23" x2="35" y2="41" stroke="#4fffb0" stroke-width="2.8" stroke-linecap="square"/>
  <polyline
    points="35,32 44,23"
    stroke="#4fffb0"
    stroke-width="2.8"
    stroke-linecap="square"
    stroke-linejoin="miter"
    fill="none"
  />
  <polyline
    points="35,32 44,41"
    stroke="#4fffb0"
    stroke-width="2.8"
    stroke-linecap="square"
    stroke-linejoin="miter"
    fill="none"
  />

  <!-- Verification dot — bottom center of hex -->
  <circle cx="32" cy="57" r="1.5" fill="#4fffb0" fill-opacity="0.6"/>
</svg>
